services:
  myapi:
    build:
      context: .
      dockerfile: ./docker/fastapi/Dockerfile
    ports:
      - 8000:80
    networks:
      - myapi_network
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    depends_on:
      - myapidb

  myapidb:
    image: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    networks:
      - myapi_network
    volumes:
      - ./myapidb_data:/var/lib/mysql

  myapiadminer:
    image: adminer
    ports:
      - 8080:8080
    networks:
      - myapi_network

networks:
  myapi_network:
    driver: bridge
